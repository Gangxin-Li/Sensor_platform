name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run schema consistency tests
        run: |
          python -m pytest -q

      - name: Validate docker-compose.yml
        run: |
          docker compose config

  deploy:
    # Optional deployment step: uses your existing k8s-deploy.sh script.
    # Requires kubectl to be configured to talk to your cluster (e.g. via KUBECONFIG secret).
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for helper scripts if needed)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install kubectl
        uses: Azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Deploy to Kubernetes via script
        env:
          # Example: point kubectl at your cluster. Replace with your own approach.
          # KUBECONFIG: ${{ secrets.KUBECONFIG }}
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          chmod +x scripts/k8s-deploy.sh
          ./scripts/k8s-deploy.sh all

