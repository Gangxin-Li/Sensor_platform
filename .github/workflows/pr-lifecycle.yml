name: PR lifecycle

on:
  pull_request:
    # Only care about PR closed events.
    types: [closed]

jobs:
  delete-branch-after-merge:
    runs-on: ubuntu-latest
    # Only run when the PR was merged (not just closed without merge).
    if: github.event.pull_request.merged == true

    steps:
      - name: Delete branch of merged PR
        # Only delete branches that belong to this repo, and avoid deleting the base branch (e.g. main).
        if: >
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.event.pull_request.head.ref != github.event.pull_request.base.ref
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="${{ github.event.pull_request.head.ref }}"
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          echo "Deleting branch $branch on $owner/$repo ..."
          curl -sS -X DELETE \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${owner}/${repo}/git/refs/heads/${branch}" \
            || echo "Branch delete request returned non-zero (maybe already deleted)."


