# Consumer (ETL): reads CDC from Kafka, transform, load into sensor_etl_load + sensor_etl_events.
# Env from consumer/configmap.yaml (ConfigMap consumer-config). Edit that file to change params.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  namespace: sensor-platform
  labels:
    app: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
        - name: consumer
          image: sensor-platform-consumer:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: consumer-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
