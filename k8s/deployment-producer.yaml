# Producer: updates 5-10 random sensors per second in Postgres (for CDC).
# Build on host: docker build -t sensor-platform-producer:latest ./producer
# Load into minikube: minikube image load sensor-platform-producer:latest
# Postgres on host: POSTGRES_HOST=host.minikube.internal so pods in minikube can reach it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: sensor-platform
  labels:
    app: producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: sensor-platform-producer:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_HOST
              value: "host.minikube.internal"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: sensor_platform
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: PRODUCER_INTERVAL_SEC
              value: "1"
            - name: PRODUCER_MIN_UPDATES
              value: "5"
            - name: PRODUCER_MAX_UPDATES
              value: "10"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
