# Producer: updates random sensors in Postgres (for CDC).
# Env from producer/configmap.yaml (ConfigMap producer-config). Edit that file to change params.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: sensor-platform
  labels:
    app: producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: sensor-platform-producer:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: producer-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
