apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: sensor-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: sensor-platform-producer:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:$(DB_PASSWORD)@db:5432/sensor_db"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: OTEL_SERVICE_NAME
              value: producer
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: producer
  namespace: sensor-platform
spec:
  selector:
    app: producer
  ports: []
  type: ClusterIP
  clusterIP: None
