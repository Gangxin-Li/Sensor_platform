scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'inference'
    static_configs:
      - targets: ['inference:8000']
    metrics_path: /metrics
  # OTel Collector Prometheus metrics (when enabled)
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
